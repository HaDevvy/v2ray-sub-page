<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>پنل اشتراک اختصاصی</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="shell center-shell">
    <section class="hero card glow">
      <div class="badge">Subscription Management</div>
      <h1>مدیریت اشتراک اختصاصی کاربران</h1>
      <p>شناسه کاربر را وارد کنید تا وضعیت سرویس، لینک اشتراک و کانفیگ‌های قابل استفاده نمایش داده شود. ارتباط با پنل فقط از طریق سرور انجام می‌شود.</p>
      <form id="lookupForm" class="lookup-form">
        <label for="email">شناسه یا ایمیل کاربر</label>
        <div class="input-row">
          <input id="email" name="email" autocomplete="off" placeholder="مثلاً user@example.com یا 6m8pbu1l5r" required />
          <button type="submit">مشاهده اشتراک</button>
        </div>
      </form>
    </section>
  </main>
  <script>
    function currentBasePath() {
      const path = location.pathname.replace(/\/+$/, '');
      return path === '/' ? '' : path;
    }

    document.querySelector('#lookupForm').addEventListener('submit', (event) => {
      event.preventDefault();
      const email = document.querySelector('#email').value.trim();
      if (!email) return;
      const params = new URLSearchParams(location.search);
      const key = params.get('key');
      location.href = `${currentBasePath()}/u/${encodeURIComponent(email)}${key ? `?key=${encodeURIComponent(key)}` : ''}`;
    });
  </script>
</body>
</html>
