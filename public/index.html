<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>صفحه اشتراک V2Ray</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="shell center-shell">
    <section class="hero card glow">
      <div class="badge">Subscription Portal</div>
      <h1>صفحه‌ی سبک و تمیز برای لینک‌های V2Ray</h1>
      <p>ایمیل/شناسه کاربر را وارد کن تا صفحه‌ی اختصاصی و لینک subscription ساخته شود. درخواست‌های پنل فقط در بک‌اند انجام می‌شوند.</p>
      <form id="lookupForm" class="lookup-form">
        <label for="email">ایمیل یا شناسه کاربر</label>
        <div class="input-row">
          <input id="email" name="email" autocomplete="off" placeholder="مثلاً 6m8pbu1l5r" required />
          <button type="submit">نمایش صفحه</button>
        </div>
      </form>
    </section>
  </main>
  <script>
    document.querySelector('#lookupForm').addEventListener('submit', (event) => {
      event.preventDefault();
      const email = document.querySelector('#email').value.trim();
      if (!email) return;
      const params = new URLSearchParams(location.search);
      const key = params.get('key');
      location.href = `/u/${encodeURIComponent(email)}${key ? `?key=${encodeURIComponent(key)}` : ''}`;
    });
  </script>
</body>
</html>
